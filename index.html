
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#E07856">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="R&M">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
      html, body { min-height: 100%; background: #EFE6D8; margin: 0; }
      #splash { position: fixed; inset: 0; z-index: 1000; display: grid; place-items: center; background: #B14228; background-image: radial-gradient(circle at 50% 35%, #C95D44, #B14228 60%, #8E3320 110%); }
      .splash-stamp { display: grid; gap: 14px; justify-items: center; padding: 36px 56px; border: 1.5px solid rgba(244,233,214,0.55); outline: 1px dashed rgba(244,233,214,0.4); outline-offset: 8px; transform: rotate(-3deg); }
      .splash-mark { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 96px; line-height: 1; color: #F4E9D6; letter-spacing: -0.04em; }
      .splash-postmark { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(244,233,214,0.85); }
    </style>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script src="app-config.js"></script>
  </head>
  <body>
    <div id="splash" class="splash" aria-hidden="true">
      <div class="splash-stamp">
        <span class="splash-mark">us</span>
        <span class="splash-postmark">— a private letter —</span>
      </div>
    </div>
    <main id="app" class="app-shell" aria-live="polite"></main>
    <script src="app.js"></script>
  </body>
</html>
